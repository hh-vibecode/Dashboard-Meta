<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<title>Dashboard MKT 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0f2f8;--bg2:#e8ebf5;--surface:#fff;--surface2:#f7f8fc;
  --border:#e2e6f0;--border2:#d0d5e8;--text:#0f1629;--text2:#4a5580;--muted:#8892b0;
  --accent:#4361ee;--accent-l:#eef0fd;
  --green:#0abf7a;--green-l:#e6faf3;
  --yellow:#f5a623;--yellow-l:#fff8ec;
  --red:#e84545;--red-l:#fef0f0;
  --purple:#7c3aed;--purple-l:#f3eeff;
  --teal:#0891b2;--teal-l:#e0f7fa;
  --orange:#f97316;--orange-l:#fff4ed;
  --shadow:0 2px 12px rgba(67,97,238,.08);
  --shadow-md:0 4px 24px rgba(67,97,238,.13);
  --sidebar-w:220px;--sidebar-w-col:56px;
  --font:'Inter',sans-serif;
}
[data-theme="dark"]{
  --bg:#0d0f14;--bg2:#141720;--surface:#1a1d2e;--surface2:#1e2235;
  --border:#252a3a;--border2:#2e3450;--text:#e8eaf0;--text2:#8892b0;--muted:#4a5580;
  --accent:#4f7dff;--accent-l:#1a2040;
  --green:#34d399;--green-l:#0f2d1f;
  --yellow:#fbbf24;--yellow-l:#2a1f05;
  --red:#f87171;--red-l:#2d1515;
  --purple:#a78bfa;--purple-l:#1e1040;
  --teal:#22d3ee;--teal-l:#0a2030;
  --orange:#fb923c;--orange-l:#2a1505;
  --shadow:0 2px 12px rgba(0,0,0,.3);--shadow-md:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--surface);border-bottom:1.5px solid var(--border);height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;box-shadow:var(--shadow)}
.sb-toggle{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;flex-shrink:0;transition:all .15s}
.sb-toggle:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.top-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:default}
.top-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover}
.top-logo-text{font-size:14px;font-weight:800;white-space:nowrap;letter-spacing:-.02em;font-family:var(--font)}
.top-logo-text span{color:var(--accent)}
.top-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.url-panel{position:absolute;top:54px;right:60px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-md);display:none;flex-direction:column;gap:10px;z-index:300;min-width:540px}
.url-panel.open{display:flex}
.url-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:11px;font-family:monospace;outline:none;transition:border-color .2s}
.url-input:focus{border-color:var(--accent)}
.settings-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;flex-shrink:0;transition:all .15s}
.settings-btn:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.settings-btn.active{background:var(--accent-l);color:var(--accent);border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#3451d1;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.top-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none;transition:all .15s;flex-shrink:0}
.top-select:focus{border-color:var(--accent)}
.date-filter{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:4px 10px;flex-shrink:0}
.date-filter label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
input[type="date"]{background:transparent;border:none;padding:3px 4px;color:var(--text);font-size:11.5px;font-family:var(--font);outline:none;cursor:pointer;border-radius:6px;min-width:100px;transition:background .15s}
input[type="date"]:hover,input[type="date"]:focus{background:var(--surface)}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6;filter:invert(30%) sepia(80%) saturate(500%) hue-rotate(210deg)}
.fdiv{width:1px;height:15px;background:var(--border)}
.theme-toggle{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px 4px 7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);font-family:var(--font);transition:all .2s;white-space:nowrap;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.toggle-track{width:28px;height:16px;background:var(--border2);border-radius:20px;position:relative;transition:background .25s;flex-shrink:0}
[data-theme="dark"] .toggle-track{background:var(--accent)}
.toggle-thumb{width:10px;height:10px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
[data-theme="dark"] .toggle-thumb{transform:translateX(12px)}

/* LAYOUT */
.app-body{display:flex;margin-top:54px;min-height:calc(100vh - 54px)}
.sidebar{position:fixed;left:0;top:54px;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;transition:width .25s cubic-bezier(.4,0,.2,1);z-index:100;overflow:hidden}
.sidebar.collapsed{width:var(--sidebar-w-col)}
.sb-strip{height:4px;background:linear-gradient(90deg,var(--accent),#7c3aed,var(--teal),var(--green));flex-shrink:0}
.sb-section{padding:16px 10px 6px;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;transition:opacity .2s}
.sidebar.collapsed .sb-section{opacity:0}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 13px;margin:2px 8px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .18s;white-space:nowrap;overflow:hidden;border:1.5px solid transparent}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent);border-color:rgba(67,97,238,.15)}
.nav-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-label{transition:opacity .2s,width .2s;overflow:hidden}
.sidebar.collapsed .nav-label{opacity:0;width:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;flex-shrink:0;transition:opacity .2s}
.sidebar.collapsed .nav-badge{opacity:0}
.main-content{margin-left:var(--sidebar-w);flex:1;padding:22px 24px 24px;transition:margin-left .25s cubic-bezier(.4,0,.2,1);min-width:0}
.main-content.collapsed{margin-left:var(--sidebar-w-col)}
.tab-page{display:none}.tab-page.active{display:block}
.page-title{font-size:18px;font-weight:800;margin-bottom:2px;letter-spacing:-.02em}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:18px;font-weight:500}

/* PERIOD BAR */
.period-bar{display:flex;align-items:center;gap:9px;margin-bottom:20px;flex-wrap:wrap}
.period-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-l);border:1px solid rgba(67,97,238,.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--accent)}
.stat-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11.5px;color:var(--text2);font-weight:600}
.refresh-btn{margin-left:auto;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:4px 11px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:600;transition:all .15s;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{background:var(--bg2);color:var(--accent);border-color:var(--accent)}

/* SEC LABEL */
.sec-label{font-size:10px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi{border-radius:14px;padding:18px 20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.13);transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.18)}
.kpi::after{content:'';position:absolute;right:-18px;bottom:-18px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
.kpi::before{content:'';position:absolute;left:-10px;top:-10px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.06)}
.kpi-icon{font-size:22px;margin-bottom:10px;position:relative;z-index:1}
.kpi-lbl{font-size:10px;font-weight:600;opacity:.85;margin-bottom:6px;position:relative;z-index:1;letter-spacing:.04em;text-transform:uppercase}
.kpi-val{font-size:22px;font-weight:900;font-family:var(--font);letter-spacing:-.03em;line-height:1.1;position:relative;z-index:1}
.kpi-sub{font-size:10px;opacity:.72;margin-top:5px;position:relative;z-index:1;font-weight:500}
.g-blue{background:linear-gradient(135deg,#4361ee,#7c3aed)}
.g-green{background:linear-gradient(135deg,#0abf7a,#0891b2)}
.g-yellow{background:linear-gradient(135deg,#f59e0b,#f97316)}
.g-purple{background:linear-gradient(135deg,#7c3aed,#4361ee)}
.g-teal{background:linear-gradient(135deg,#0891b2,#0abf7a)}
.g-orange{background:linear-gradient(135deg,#f97316,#f59e0b)}
.g-pink{background:linear-gradient(135deg,#ec4899,#e84545)}
.g-red{background:linear-gradient(135deg,#e84545,#ec4899)}
[data-theme="dark"] .kpi{color:#fff!important}
[data-theme="dark"] .kpi .kpi-lbl{color:rgba(255,255,255,.85)!important}
[data-theme="dark"] .kpi .kpi-val{color:#fff!important}
[data-theme="dark"] .kpi .kpi-sub{color:rgba(255,255,255,.7)!important}
[data-theme="dark"] .kpi .kpi-icon{color:#fff!important}

/* CHARTS */
.charts-2col-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:700}
.chart-sub{font-size:11px;color:var(--muted);font-weight:500}
.chart-wrap{height:200px;position:relative}
.chart-empty{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px}
.chart-empty .icon{font-size:28px;opacity:.4}
.chart-empty p{font-size:11px;text-align:center;line-height:1.5;font-weight:500}

/* TABLES */
.tov-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.tov-head{padding:14px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--surface2),var(--bg2));flex-wrap:wrap}
.tov-title{font-size:14px;font-weight:800}
.tov-scroll{overflow-x:auto}
.grp-table{width:100%;border-collapse:collapse;font-size:12px}
.grp-table thead tr{background:var(--surface2)}
.grp-table th{padding:9px 13px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);white-space:nowrap;border-bottom:1.5px solid var(--border)}
.grp-table td{padding:9px 13px;white-space:nowrap;border-bottom:1px solid var(--border);font-weight:500}
.grp-table tbody tr:last-child td{border-bottom:none}
.grp-table tbody tr:hover{background:var(--bg2)}
.row-brand-ht td:first-child{color:var(--orange);font-weight:800;padding-left:13px}
.row-brand-sd td:first-child{color:var(--teal);font-weight:800;padding-left:13px}
.row-brand-ct td:first-child{color:var(--purple);font-weight:800;padding-left:13px}
.row-product td:first-child{padding-left:36px;color:var(--text2);font-size:11.5px;font-weight:600}
.num-cell{font-family:var(--font);font-weight:700;font-size:12px}
.tbl-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.tbl-head{padding:14px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--surface2),var(--bg2))}
.tbl-title{font-size:14px;font-weight:800}
.tbl-count{font-size:11px;font-weight:700;background:var(--accent-l);color:var(--accent);padding:3px 10px;border-radius:20px;border:1px solid rgba(67,97,238,.2)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--surface2)}
thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);white-space:nowrap;border-bottom:1.5px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
td{padding:10px 13px;white-space:nowrap;font-weight:500}
td.num{font-family:var(--font);font-size:12px;font-weight:700}
td.name{max-width:190px;overflow:hidden;text-overflow:ellipsis;font-weight:700;font-size:12.5px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.badge-active{background:var(--green-l);color:var(--green);border:1px solid rgba(10,191,122,.25)}.badge-active::before{background:var(--green)}
.badge-archived{background:var(--yellow-l);color:#d97706;border:1px solid #fde68a}.badge-archived::before{background:var(--yellow)}
.badge-other{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.badge-other::before{background:var(--muted)}
.brand-ht{display:inline-flex;align-items:center;background:var(--orange-l);color:var(--orange);border:1px solid rgba(249,115,22,.2);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.brand-sd{display:inline-flex;align-items:center;background:var(--teal-l);color:var(--teal);border:1px solid rgba(8,145,178,.2);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.brand-ct{display:inline-flex;align-items:center;background:var(--purple-l);color:var(--purple);border:1px solid rgba(124,58,237,.2);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.bar-cell{display:flex;align-items:center;gap:7px}
.bar-bg{flex:1;height:4px;background:var(--bg2);border-radius:3px;min-width:45px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}

/* loading/err */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spin{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--red-l);border:1.5px solid #fecaca;border-radius:12px;padding:18px 22px;color:var(--red);font-size:13px;margin:16px 0;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <button class="sb-toggle" onclick="toggleSidebar()">☰</button>
  <div class="top-logo">
    <img src="logo.png" style="width:60px;height:60px;object-fit:contain" id="logoImg">
  </div>
  <div class="topbar-right">
  <div class="date-filter">
    <select style="background:transparent;border:none;color:var(--text2);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;outline:none;padding:2px 4px" id="quickFilter" onchange="applyQuickFilter()">
      <option value="">Chọn nhanh…</option>
      <option value="today">Hôm nay</option>
      <option value="yesterday">Hôm qua</option>
      <option value="7days">7 ngày qua</option>
      <option value="30days">30 ngày qua</option>
      <option value="thismonth">Tháng này</option>
      <option value="lastmonth">Tháng trước</option>
    </select>
    <div class="fdiv"></div>
    <label>Từ</label>
    <input type="date" id="dateFrom" onchange="applyFilter()">
    <div class="fdiv"></div>
    <label>Đến</label>
    <input type="date" id="dateTo" onchange="applyFilter()">
    <div class="fdiv"></div>
    <button class="btn-ghost" onclick="clearFilter()">Xoá</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span id="themeLabel">Tối</span>
  </button>
  <button class="settings-btn" id="settingsBtn" onclick="toggleUrlPanel()" title="Cài đặt nguồn dữ liệu">⚙️</button>
  </div>
</div>

<div class="url-panel" id="urlPanel">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:10px;font-weight:700;color:var(--muted);width:74px;flex-shrink:0">📊 MKT ADS</span>
    <input class="url-input" id="sheetUrl" placeholder="Link Google Sheets MKT published CSV…"/>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:10px;font-weight:700;color:var(--muted);width:74px;flex-shrink:0">💰 SALE CRM</span>
    <input class="url-input" id="saleUrl" placeholder="Link Google Sheets SALE/CRM published CSV…"/>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:10px;font-weight:700;color:var(--muted);width:74px;flex-shrink:0">👥 CRM HUB</span>
    <input class="url-input" id="crmHubUrl" placeholder="Link Google Sheets Master Data Hub published CSV…"/>
  </div>
  <div style="display:flex;justify-content:flex-end">
    <button class="btn" id="btnLoad" onclick="loadData()">↺ Tải tất cả</button>
  </div>
</div>

<div class="app-body">
  <div class="sidebar" id="sidebar">
    <div class="sb-strip"></div>
    <div class="sb-section">Marketing</div>
    <nav>
      <div class="nav-item active" onclick="switchPage('overview')" id="nav-overview"><span class="nav-icon">📊</span><span class="nav-label">Tổng Quan</span></div>
      <div class="nav-item" onclick="switchPage('detail')" id="nav-detail"><span class="nav-icon">📋</span><span class="nav-label">Chi Tiết</span></div>
    </nav>
    <div class="sb-section" style="margin-top:12px">Sale</div>
    <nav>
      <div class="nav-item" onclick="switchPage('sale-overview')" id="nav-sale-overview"><span class="nav-icon">💰</span><span class="nav-label">Tổng Quan</span></div>
      <div class="nav-item" onclick="switchPage('sale-detail')" id="nav-sale-detail"><span class="nav-icon">📑</span><span class="nav-label">Chi Tiết</span></div>
    </nav>
  </div>

  <div class="main-content" id="mainContent">
    <div class="tab-page active" id="page-overview">
      <div class="loading"><div class="spin"></div><br><span style="font-size:13px;font-weight:700;color:var(--text2)">Đang tải dữ liệu…</span></div>
    </div>
    <div class="tab-page" id="page-detail">

<script>
const COL={
  CAMPAIGN:0,AD_ID:1,DATE:2,REACH:4,IMPRESSIONS:5,SPEND:8,MESSAGES:10,CTR:11,CPC:12,COMMENTS:13,
};
const COL_SALE={
  DATE_CREATE:0,LEAD_ID:1,NAME:2,PHONE:3,SOURCE:4,CHANNEL:5,
  SALES_PERSON:6,AD_ID:7,PRODUCT:8,POTENTIAL:9,STATUS:10,
  CONTENT:11,LOST_GROUP:12,LOST_REASON:13,DATE_CLOSE:14,REVENUE:15,CUSTOMER_ID:16,
};
const COL_CRM={DATE:0,LEAD_ID:1,NAME:2,PHONE:3,SOURCE:4,CHANNEL:5,CUST_TYPE:6,DEPT:7,SALES:8,AD_ID:9};
let allRows=[],saleRowsRaw=[],crmHubRows=[],chartBrand=null,chartProd=null,chartWave=null,chartProdRev=null,chartBrandRev=null,chartCrmChannel=null,chartCrmSales=null,sbCollapsed=false;

// ── Theme ──

// ── Load ──
async function loadData(){
  const mktRaw=document.getElementById('sheetUrl').value.trim();
  const saleRaw=document.getElementById('saleUrl').value.trim();
  const crmRaw=document.getElementById('crmHubUrl').value.trim();
  if(!mktRaw&&!crmRaw)return;
  showLoading();
  document.getElementById('btnLoad').disabled=true;
  try{
    const tasks=[];
    const taskIdx={};
    if(mktRaw){taskIdx.mkt=tasks.length;tasks.push(fetchCsvWithProxy(mktRaw,0));}
    if(saleRaw){taskIdx.sale=tasks.length;tasks.push(fetchCsvWithProxy(saleRaw,1));}
    if(crmRaw){taskIdx.crm=tasks.length;tasks.push(fetchCsvWithProxy(crmRaw,2));}
    setStatus('Đang kết nối dữ liệu...');
    const results=await Promise.allSettled(tasks);
    if(mktRaw){
      if(results[taskIdx.mkt].status==='rejected')throw new Error('MKT: '+results[taskIdx.mkt].reason.message);
      setStatus('Nhận data MKT, đang parse...');
      parseMktCsv(results[taskIdx.mkt].value);
      setStatus(`Parse xong MKT: ${allRows.length} chiến dịch`);
    }
    if(saleRaw&&taskIdx.sale!=null){
      const r=results[taskIdx.sale];
      if(r.status==='fulfilled'){setStatus('Đang parse SALE...');parseSaleCsv(r.value);setStatus(`Parse xong SALE: ${saleRowsRaw.length} rows`);}
      else setStatus('⚠️ SALE không tải được');
    }
    if(crmRaw&&taskIdx.crm!=null){
      const r=results[taskIdx.crm];
      if(r.status==='fulfilled'){setStatus('Đang parse CRM Hub...');parseCrmHub(r.value);setStatus(`Parse xong CRM Hub: ${crmHubRows.length} leads`);}
      else setStatus('⚠️ CRM Hub không tải được');
    }
    document.getElementById('btnLoad').disabled=false;
    setStatus('Đang render...');
    if(mktRaw)applyFilter();
    renderSaleOverview();
    renderSaleDetail();
  }catch(e){showErr('Không tải được: '+e.message);document.getElementById('btnLoad').disabled=false;}
}

async function fetchCsvWithProxy(rawUrl,idx=0){
  const labels=['MKT','SALE'];
  const lbl=labels[idx]||'';
  const csvUrl=toCsv(rawUrl)+'&cachebust='+Date.now();
  const proxies=['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://thingproxy.freeboard.io/fetch/'];
  for(let i=0;i<proxies.length;i++){
    const proxy=proxies[i];
    setStatus(`[${lbl}] Thử proxy ${i+1}/3...`);
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),15000);
      const res=await fetch(proxy+encodeURIComponent(csvUrl),{signal:ctrl.signal});
      if(!res.ok){clearTimeout(timer);setStatus(`[${lbl}] Proxy ${i+1} lỗi ${res.status}, thử tiếp...`);continue;}
      setStatus(`[${lbl}] Proxy ${i+1} OK, đang tải data...`);
      const text=await res.text();
      clearTimeout(timer);
      setStatus(`[${lbl}] Tải xong (${Math.round(text.length/1024)}KB)`);
      return text;
    }catch(e){setStatus(`[${lbl}] Proxy ${i+1} timeout/lỗi, thử tiếp...`);continue;}
  }
  throw new Error(`[${lbl}] Không kết nối được proxy (đã thử 3 servers)`);
}

function parseMktCsv(text){
  let parsed;
  Papa.parse(text,{skipEmptyLines:true,complete:r=>{parsed=r;}});
  // Auto-detect column positions from header row — resilient to new columns being added
  const headers=(parsed.data[0]||[]).map(h=>String(h).trim().toLowerCase());
  console.log('[MKT] Headers:',headers);
  function ci(kws,fb){
    for(const kw of kws){const i=headers.findIndex(h=>h.includes(kw));if(i>=0)return i;}
    return fb;
  }
  COL.CAMPAIGN   =ci(['tên chiến dịch','campaign name'],0);
  COL.AD_ID      =ci(['mã quảng cáo','ad id'],1);
  COL.DATE       =ci(['ngày bắt đầu','reporting starts','ngày'],2);
  COL.REACH      =ci(['phạm vi tiếp cận','reach'],4);
  COL.IMPRESSIONS=ci(['lượt hiển thị','impressions'],5);
  COL.SPEND      =ci(['số tiền đã chi','amount spent','chi phí','chi tiêu'],8);
  COL.MESSAGES   =headers.findIndex(h=>(h.includes('lượt bắt đầu cuộc trò chuyện')||h.includes('conversations started')||h.includes('messaging conversations started'))&&!h.startsWith('chi'));
  if(COL.MESSAGES<0)COL.MESSAGES=12;
  COL.CTR        =ci(['ctr'],11);
  COL.CPC        =ci(['cpc'],12);
  COL.COMMENTS   =ci(['bình luận','comment'],13);
  COL.ADSET_NAME =ci(['tên nhóm quảng cáo','ad set name','tên nhóm'],-1);
  COL.AD_NAME    =ci(['tên quảng cáo','ad name'],-1);
  console.log('[MKT] COL detected:',JSON.stringify(COL));
  const allData=parsed.data.slice(1).filter(row=>row.some(c=>c!==''));
  // Fill-down: date, campaign, ad-set (FB report only puts values on first row of each group)
  let lastCamp='',lastAdSet='',lastDate='';
  allData.forEach(row=>{
    // Fill-down date (skip 'all' rows — those are grand-total rows)
    const dv=(row[COL.DATE]||'').trim();
    if(dv&&dv.toLowerCase()!=='all')lastDate=dv;
    else if(!dv)row[COL.DATE]=lastDate;
    // Fill-down campaign
    const camp=(row[COL.CAMPAIGN]||'').trim();
    if(camp&&camp.toLowerCase()!=='all'){lastCamp=camp;lastAdSet='';}
    else if(!camp)row[COL.CAMPAIGN]=lastCamp;
    // Fill-down ad-set
    if(COL.ADSET_NAME>=0){
      const as=(row[COL.ADSET_NAME]||'').trim();
      if(as&&as.toLowerCase()!=='all')lastAdSet=as;
      else if(!as)row[COL.ADSET_NAME]=lastAdSet;
    }
  });
  window.allRowsRaw=allData;
  allRows=allData.filter(row=>{
    const campName=(row[COL.CAMPAIGN]||'').trim();
    if(!campName||campName.toLowerCase()==='all')return false;
    const adId=String(row[COL.AD_ID]||'').trim();
    if(/^\d{8,}$/.test(adId))return false; // ad-level rows
    const adIdIsBlank=!adId||adId==='-'||adId==='—'||adId==='0'||adId.toLowerCase()==='all'||adId==='tất cả';
    if(!adIdIsBlank)return false;
    // Exclude ad-set level rows:
    // 1. If ADSET_NAME col detected: exclude rows with specific (non-All) adset value
    if(COL.ADSET_NAME>=0){
      const as=(row[COL.ADSET_NAME]||'').trim();
      if(as&&as.toLowerCase()!=='all')return false;
    } else if(COL.AD_ID>COL.CAMPAIGN){
      // 2. No ADSET col: scan columns between CAMPAIGN and AD_ID —
      //    campaign-level rows have all these empty or "All";
      //    ad-set/ad-level rows have at least one specific value
      for(let c=COL.CAMPAIGN+1;c<COL.AD_ID;c++){
        if(c===COL.DATE)continue;
        const v=(row[c]||'').trim();
        if(v&&v.toLowerCase()!=='all')return false;
      }
    }
    const dateCol=(row[COL.DATE]||'').trim();if(!dateCol)return false;
    const dl=dateCol.toLowerCase().replace(/\s/g,'');
    if(dl==='all'||dl==='tấtcả'||dl==='tatca')return false;
    return parseDate(dateCol)!==null;
  });
  // Safety: if ADSET_NAME detection wiped out all campaign rows, disable it and retry
  if(!allRows.length&&allData.length>0&&COL.ADSET_NAME>=0){
    console.warn('[MKT] ADSET_NAME col excluded all rows — disabling, retrying filter');
    COL.ADSET_NAME=-1;
    allRows=allData.filter(row=>{
      const campName=(row[COL.CAMPAIGN]||'').trim();
      if(!campName||campName.toLowerCase()==='all')return false;
      const adId=String(row[COL.AD_ID]||'').trim();
      if(/^\d{8,}$/.test(adId))return false;
      const adIdIsBlank=!adId||adId==='-'||adId==='—'||adId==='0'||adId.toLowerCase()==='all'||adId==='tất cả';
      if(!adIdIsBlank)return false;
      if(COL.AD_ID>COL.CAMPAIGN){
        for(let c=COL.CAMPAIGN+1;c<COL.AD_ID;c++){
          if(c===COL.DATE)continue;
          const v=(row[c]||'').trim();
          if(v&&v.toLowerCase()!=='all')return false;
        }
      }
      const dateCol=(row[COL.DATE]||'').trim();if(!dateCol)return false;
      const dl=dateCol.toLowerCase().replace(/\s/g,'');
      if(dl==='all'||dl==='tấtcả'||dl==='tatca')return false;
      return parseDate(dateCol)!==null;
    });
  }
  // Store debug breakdown for error reporting
  if(!allRows.length&&allData.length>0){
    const s=allData[0]||[];
    window._mktDebug={
      cols:`CAMP=${COL.CAMPAIGN} ADID=${COL.AD_ID} DATE=${COL.DATE} ADSET=${COL.ADSET_NAME}`,
      r0:`camp="${s[COL.CAMPAIGN]||''}" adid="${s[COL.AD_ID]||''}" date="${s[COL.DATE]||''}"`,
      why:{
        nocamp:allData.filter(r=>!(r[COL.CAMPAIGN]||'').trim()).length,
        numId:allData.filter(r=>/^\d{8,}$/.test(String(r[COL.AD_ID]||'').trim())).length,
        nonBlankId:allData.filter(r=>{const v=String(r[COL.AD_ID]||'').trim();return v&&v!=='-'&&v!=='—'&&v!=='0'&&!/^\d{8,}$/.test(v);}).length,
        noDate:allData.filter(r=>!(r[COL.DATE]||'').trim()).length,
        allStr:allData.filter(r=>['all','tấtcả','tatca'].includes((r[COL.DATE]||'').trim().toLowerCase().replace(/\s/g,''))).length,
        badDate:allData.filter(r=>{const v=(r[COL.DATE]||'').trim();return v&&!parseDate(v);}).length,
      }
    };
  }
  console.log('[MKT] allRows:',allRows.length,'/ raw:',allData.length);
}

function parseSaleCsv(text){
  let parsed;
  Papa.parse(text,{skipEmptyLines:true,complete:r=>{parsed=r;}});
  saleRowsRaw=parsed.data.slice(1).filter(row=>row.some(c=>c!==''));
  console.log('[SALE] Rows parsed:',saleRowsRaw.length);
}

function parseCrmHub(text){

  Papa.parse(text,{skipEmptyLines:true,complete:r=>{parsed=r;}});
  crmHubRows=parsed.data.slice(1).filter(row=>row.some(c=>c!==''));
  console.log('[CRM] Rows:',crmHubRows.length);

function buildAdCampMap(){
  const map={};
  (window.allRowsRaw||[]).forEach(r=>{
    const adId=String(r[COL.AD_ID]||'').trim();
    const camp=(r[COL.CAMPAIGN]||'').trim();
    if(/^\d{8,}$/.test(adId)&&camp)map[adId]=camp;
  });
  return map;
}

function filterSaleRows(from,to){
  const base=saleRowsRaw.filter(r=>{
    const src=(r[COL_SALE.SOURCE]||'').trim().toLowerCase();
    const ch=(r[COL_SALE.CHANNEL]||'').trim().toLowerCase();
    const adId=(r[COL_SALE.AD_ID]||'').trim();
    return src==='online'&&ch.includes('facebook');
  });
  if(!from&&!to)return base;
  const fromD=from?localDate(from):null;
  const toD=to?localDate(to,true):null;
  return base.filter(r=>{
    const isClosed=/^chốt\s*đơn/i.test(r[COL_SALE.STATUS]||'');
    const dateCol=isClosed?r[COL_SALE.DATE_CLOSE]:r[COL_SALE.DATE_CREATE];
    const d=parseDate(dateCol);if(!d)return false;
    if(fromD&&d<fromD)return false;
    if(toD&&d>toD)return false;
    return true;
  });
}

function calcSaleStats(saleFiltered){
  if(!saleFiltered||!saleFiltered.length)return null;
  const adCampMap=buildAdCampMap();
  const isChot=r=>/^chốt\s*đơn/i.test(r[COL_SALE.STATUS]||'');
  const closedRows=saleFiltered.filter(isChot);
  const totalRevenue=closedRows.reduce((s,r)=>s+toNum(r[COL_SALE.REVENUE]),0);
  const totalOrders=closedRows.length;
  const totalLeads=saleFiltered.length;
  const byCamp={};
  const byDirectProd={HT:{},Shidai:{},CT:{}};
  function directBrand(r){
    const text=(r[COL_SALE.CHANNEL]||'')+' '+(r[COL_SALE.PRODUCT]||'');
    if(/ht[\s\-–]|hiến thuỷ|hien thuy/i.test(text))return'HT';
    if(/shidai/i.test(text))return'Shidai';
    if(/chánh tâm|chanh tam|ct[\s\-–]/i.test(text))return'CT';
    return null;
  }
  saleFiltered.forEach(r=>{
    const adId=(r[COL_SALE.AD_ID]||'').trim();
    const camp=adId?adCampMap[adId]:'';
    if(camp){
      if(!byCamp[camp])byCamp[camp]={leads:0,orders:0,revenue:0};
      byCamp[camp].leads++;
      if(isChot(r)){byCamp[camp].orders++;byCamp[camp].revenue+=toNum(r[COL_SALE.REVENUE]);}
    } else {
      const br=directBrand(r);
      const prod=detectProduct(r[COL_SALE.PRODUCT]||'');
      if(br){
        if(!byDirectProd[br][prod])byDirectProd[br][prod]={leads:0,orders:0,revenue:0};
        byDirectProd[br][prod].leads++;
        if(isChot(r)){byDirectProd[br][prod].orders++;byDirectProd[br][prod].revenue+=toNum(r[COL_SALE.REVENUE]);}
      }
    }
  });
  const byBrand={HT:{leads:0,orders:0,revenue:0},Shidai:{leads:0,orders:0,revenue:0},CT:{leads:0,orders:0,revenue:0}};
  const byProd={};
  Object.entries(byCamp).forEach(([camp,s])=>{
    const br=detectBrand(camp);if(byBrand[br]){byBrand[br].leads+=s.leads;byBrand[br].orders+=s.orders;byBrand[br].revenue+=s.revenue;}
    const pr=detectProduct(camp);
    const key=br+'__'+pr;
    if(!byProd[key])byProd[key]={leads:0,orders:0,revenue:0};
    byProd[key].leads+=s.leads;byProd[key].orders+=s.orders;byProd[key].revenue+=s.revenue;
  });
  // Include direct purchases in byBrand for chart accuracy
  ['HT','Shidai','CT'].forEach(br=>{
    Object.values(byDirectProd[br]).forEach(s=>{
      byBrand[br].leads+=s.leads;byBrand[br].orders+=s.orders;byBrand[br].revenue+=s.revenue;
    });
  });
  return{totalRevenue,totalOrders,totalLeads,
    avgOrderValue:totalOrders>0?totalRevenue/totalOrders:0,
    convRate:totalLeads>0?totalOrders/totalLeads:0,
    byCamp,byBrand,byProd,byDirectProd};
}

function toCsv(u){
  u=u.replace('/pubhtml','/pub').replace('output=html','output=csv');
  if(!u.includes('output=csv'))u+=(u.includes('?')?'&':'?')+'output=csv';
  if(!u.includes('single='))u+='&single=true';
  return u;
}

// ── Filters ──
function applyFilter(){
  if(!allRows.length){
    if(window.allRowsRaw&&window.allRowsRaw.length>0){
      const d=window._mktDebug||{};
      const w=d.why||{};
      showErr(`Tải được ${window.allRowsRaw.length} rows nhưng allRows=0.\n`+
        `Cột dùng: ${d.cols||'?'}\nRow đầu: ${d.r0||'?'}\n`+
        `Lý do bị lọc: noCamp=${w.nocamp} numId=${w.numId} nonBlankId=${w.nonBlankId} noDate=${w.noDate} allStr=${w.allStr} badDate=${w.badDate}`);
    }
    return;
  }
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  const brandEl=document.getElementById('brandFilter');
  const brand=brandEl?brandEl.value:'all';
  const prodEl=document.getElementById('prodFilter');
  const prod=prodEl?prodEl.value:'all';
  let rows=allRows;
  if(from||to){
    const fromD=from?localDate(from):null;
    const toD=to?localDate(to,true):null;
    rows=rows.filter(r=>{
      const d=parseDate(r[COL.DATE]);if(!d)return true;
      if(fromD&&d<fromD)return false;
      if(toD&&d>toD)return false;
      return true;
    });
  }
  if(brand!=='all')rows=rows.filter(r=>detectBrand(r[COL.CAMPAIGN])===brand);
  if(prod!=='all')rows=rows.filter(r=>detectProduct(r[COL.CAMPAIGN])===prod);

  let saleFiltered=filterSaleRows(from,to);
  if(saleFiltered.length&&(brand!=='all'||prod!=='all')){
    const adCampMap=buildAdCampMap();
    saleFiltered=saleFiltered.filter(r=>{
      const camp=adCampMap[(r[COL_SALE.AD_ID]||'').trim()];if(!camp)return false;
      if(brand!=='all'&&detectBrand(camp)!==brand)return false;
      if(prod!=='all'&&detectProduct(camp)!==prod)return false;
      return true;
    });
  }
  window._saleFiltered=saleFiltered;
  renderAll(rows,saleFiltered);
}
function clearFilter(){
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.getElementById('quickFilter').value='';
  const bf=document.getElementById('brandFilter');if(bf)bf.value='all';
  const pf=document.getElementById('prodFilter');if(pf)pf.value='all';
  if(allRows.length)renderAll(allRows);
}
function localDate(str,end=false){
  const p=str.split('-');
  return end?new Date(+p[0],+p[1]-1,+p[2],23,59,59):new Date(+p[0],+p[1]-1,+p[2],0,0,0);
}
function applyQuickFilter(){
  const v=document.getElementById('quickFilter').value;
  if(!v)return;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let from,to;
  if(v==='today'){from=to=fmt(today);}
  else if(v==='yesterday'){const y=new Date(today);y.setDate(y.getDate()-1);from=to=fmt(y);}
  else if(v==='7days'){const s=new Date(today);s.setDate(s.getDate()-6);from=fmt(s);to=fmt(today);}
  else if(v==='30days'){const s=new Date(today);s.setDate(s.getDate()-29);from=fmt(s);to=fmt(today);}
  else if(v==='thismonth'){from=fmt(new Date(today.getFullYear(),today.getMonth(),1));to=fmt(today);}
  else if(v==='lastmonth'){
    from=fmt(new Date(today.getFullYear(),today.getMonth()-1,1));
    to=fmt(new Date(today.getFullYear(),today.getMonth(),0));
  }
  document.getElementById('dateFrom').value=from;
  document.getElementById('dateTo').value=to;
  applyFilter();
}

// ── Brand & Product ──
function detectBrand(name){
  const n=(name||'').trim();
  if(/^HT[\s\-–]/i.test(n)||/^HT$/i.test(n))return'HT';
  if(/shidai/i.test(n))return'Shidai';
  if(/chánh tâm|chanh tam|^CT[\s\-–]/i.test(n))return'CT';
  return'CT';
}
function detectProduct(name){
  const n=(name||'').toLowerCase();
  if(/thần tài|ban thần tài|tài địa|di lặc|quan lộc/.test(n))return'Thần Tài';
  if(/tượng phật/.test(n))return'Tượng Phật';
  if(/đèn thờ|đèn/.test(n))return'Đèn Thờ';
  if(/ban thờ|bàn thờ|đồ thờ/.test(n))return'Ban Thờ';
  if(/dịch vụ/.test(n))return'Dịch Vụ';
  const cleaned=(name||'').trim().replace(/^(HT|Shidai)\s*[-–]\s*/i,'').replace(/\s*[-–]\s*(fix bài cũ|mess tiềm năng|mess mua hàng).*$/i,'').replace(/\s*[-–]\s*\d{2}\/\d{2}.*/,'').trim();
  return cleaned||'Khác';
}
function getBrandBadge(name){
  const b=detectBrand(name);
  return b==='HT'?'<span class="brand-ht">HT</span>':b==='Shidai'?'<span class="brand-sd">SD</span>':'<span class="brand-ct">CT</span>';
}

// ── Render All ──
function renderAll(rows,saleFiltered){
  if(chartBrand){chartBrand.destroy();chartBrand=null;}
  if(chartProd){chartProd.destroy();chartProd=null;}
  if(chartWave){chartWave.destroy();chartWave=null;}
  if(chartProdRev){chartProdRev.destroy();chartProdRev=null;}
  if(chartBrandRev){chartBrandRev.destroy();chartBrandRev=null;}
  const kpi=calcKPI(rows);
  const saleStats=calcSaleStats(saleFiltered||[]);
  const byCamp=groupByCamp(rows);
  const camps=Object.values(byCamp).sort((a,b)=>b.spend-a.spend);
  const dates=rows.map(r=>parseDate(r[COL.DATE])).filter(Boolean);
  const minD=dates.length?new Date(Math.min(...dates)):null;
  const maxD=dates.length?new Date(Math.max(...dates)):null;
  const fromVal=document.getElementById('dateFrom')?document.getElementById('dateFrom').value:'';
  const toVal=document.getElementById('dateTo')?document.getElementById('dateTo').value:'';
  let period;
  if(minD&&maxD){
    period=fmtDate(minD)===fmtDate(maxD)?fmtDate(minD):fmtDate(minD)+' → '+fmtDate(maxD);
  } else if(fromVal||toVal){
    period=(fromVal?fromVal.split('-').reverse().join('/'):'...')+' → '+(toVal?toVal.split('-').reverse().join('/'):'...');
  } else {
    period='Toàn bộ';
  }

  const htSpend=camps.filter(c=>detectBrand(c.name)==='HT').reduce((s,c)=>s+c.spend,0);
  const sdSpend=camps.filter(c=>detectBrand(c.name)==='Shidai').reduce((s,c)=>s+c.spend,0);
  const ctSpend=camps.filter(c=>detectBrand(c.name)==='CT').reduce((s,c)=>s+c.spend,0);
  const total=htSpend+sdSpend+ctSpend||1;

  const prodCount={};
  camps.forEach(c=>{const p=detectProduct(c.name);prodCount[p]=(prodCount[p]||0)+1;});

  const allProds=[...new Set(allRows.map(r=>detectProduct(r[COL.CAMPAIGN])))].filter(Boolean).sort();

  const _bf=document.getElementById('brandFilter');
  const _pf=document.getElementById('prodFilter');
  const _bv=_bf?_bf.value:'all';
  const _pv=_pf?_pf.value:'all';
  renderOverview(rows,kpi,saleStats,camps,period,htSpend,sdSpend,ctSpend,total,prodCount,allProds,saleFiltered||[]);
  const bf2=document.getElementById('brandFilter');
  const pf2=document.getElementById('prodFilter');
  if(bf2)bf2.value=_bv;
  if(pf2&&allProds.includes(_pv))pf2.value=_pv;
  renderDetail(camps,period,rows,saleStats);
}

    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'var(--text)',font:{size:11,weight:'600'},padding:12,
      generateLabels:c=>{const d=c.data;return d.labels.map((l,i)=>({text:`${l}  ${d.datasets[0].data[i]}`,fillStyle:d.datasets[0].backgroundColor[i],strokeStyle:'transparent',lineWidth:0,hidden:false,index:i}));}}},

}

function buildGroupedTable(rows,saleStats){
  const cols=['Brand / Sản phẩm','Ngân sách Ads','Số Mess','Số Comment','CP/Mess','ADS/DS','Doanh số','Đơn chốt','DS TB/đơn','Tỷ lệ chốt'];
  let html=`<table class="grp-table"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  function rowCells(kpi,sd){
    const adsDs=sd&&sd.revenue>0?pct(kpi.spend/sd.revenue*100):'—';
    const dsColor=sd&&sd.revenue>0?'var(--text)':'var(--muted)';
    return `<td class="num-cell">${vnd(kpi.spend)}</td>
            <td class="num-cell">${num(kpi.mess)}</td>
            <td class="num-cell">${kpi.comments>0?num(kpi.comments):'—'}</td>
            <td class="num-cell">${kpi.mess>0?vnd(kpi.spend/kpi.mess):'—'}</td>
            <td class="num-cell" style="color:${sd&&sd.revenue>0?'var(--green)':'var(--muted)'};font-weight:700">${adsDs}</td>
            <td class="num-cell" style="color:${dsColor};font-weight:700">${sd?vnd(sd.revenue):'—'}</td>
            <td class="num-cell" style="color:${dsColor}">${sd?num(sd.orders):'—'}</td>
            <td class="num-cell" style="color:${dsColor}">${sd&&sd.orders>0?vnd(sd.revenue/sd.orders):'—'}</td>
            <td class="num-cell" style="color:${dsColor}">${sd&&kpi.mess>0?pct(sd.orders/kpi.mess*100):'—'}</td>`;
  }
  const byBrand={HT:[],Shidai:[],CT:[]};
  rows.forEach(r=>{const b=detectBrand(r[COL.CAMPAIGN]);if(byBrand[b])byBrand[b].push(r);});
  ['HT','Shidai','CT'].forEach(br=>{
    if(!byBrand[br].length)return;
    const bkpi=calcKPIRows(byBrand[br]);
    const brSd=saleStats?saleStats.byBrand[br]:null;
    const bc=br==='HT'?'row-brand-ht':br==='Shidai'?'row-brand-sd':'row-brand-ct';
    const bl=br==='HT'?'<span class="brand-ht">Hiền Thuỷ</span>':br==='Shidai'?'<span class="brand-sd">Shidai</span>':'<span class="brand-ct">Chánh Tâm</span>';
    html+=`<tr class="${bc}"><td>${bl}</td>${rowCells(bkpi,brSd)}</tr>`;
    const byProd={};
    byBrand[br].forEach(r=>{const p=detectProduct(r[COL.CAMPAIGN]);if(!byProd[p])byProd[p]=[];byProd[p].push(r);});
    const brDirectProds=saleStats&&saleStats.byDirectProd?saleStats.byDirectProd[br]:{};
    const shownDirect=new Set();
    function directRow(prod,sd){
      if(!sd||(!sd.orders&&!sd.leads))return'';
      shownDirect.add(prod);
      const dsColor=sd.revenue>0?'var(--text)':'var(--muted)';
      return`<tr class="row-product" style="opacity:.85">
        <td style="font-style:italic;color:var(--muted);padding-left:28px">↳ ${prod} (trực tiếp trên page)</td>
        <td class="num-cell" style="color:var(--muted)">—</td><td class="num-cell" style="color:var(--muted)">—</td>
        <td class="num-cell" style="color:var(--muted)">—</td><td class="num-cell" style="color:var(--muted)">—</td>
        <td class="num-cell" style="color:var(--muted)">—</td>
        <td class="num-cell" style="color:${dsColor};font-weight:700">${vnd(sd.revenue)}</td>
        <td class="num-cell" style="color:${dsColor}">${num(sd.orders)}</td>
        <td class="num-cell" style="color:${dsColor}">${sd.orders>0?vnd(sd.revenue/sd.orders):'—'}</td>
        <td class="num-cell" style="color:var(--muted)">—</td>
      </tr>`;
    }
    Object.entries(byProd).sort((a,b)=>calcKPIRows(b[1]).spend-calcKPIRows(a[1]).spend).forEach(([p,pr])=>{
      const pkpi=calcKPIRows(pr);
      const prSd=saleStats?saleStats.byProd[br+'__'+p]:null;
      html+=`<tr class="row-product"><td>↳ ${p}</td>${rowCells(pkpi,prSd)}</tr>`;
      html+=directRow(p,brDirectProds[p]);
    });
    // direct products that have no campaign counterpart
    Object.entries(brDirectProds).sort((a,b)=>b[1].revenue-a[1].revenue).forEach(([prod,sd])=>{
      if(shownDirect.has(prod))return;
      html+=directRow(prod,sd);
    });
  });
  return html+'</tbody></table>';
}

// ── Expand ad con ──
function toggleAds(safeId){
  const row=document.getElementById('ads-'+safeId);
  const arrow=document.getElementById('arrow-'+safeId);
  const content=document.getElementById('ads-content-'+safeId);
  const isOpen=row.style.display!=='none';
  if(isOpen){row.style.display='none';arrow.textContent='▶';}
  else{
    row.style.display='';
    arrow.innerHTML='<span style="color:var(--accent)">▼</span>';
    const campName=decodeURIComponent(safeId);
    const fromVal=(document.getElementById('dateFrom')||{}).value||'';
    const toVal=(document.getElementById('dateTo')||{}).value||'';
    const fromD=fromVal?localDate(fromVal):null;
    const toD=toVal?localDate(toVal,true):null;
    const _rawAll=window.allRowsRaw||[];

    // Per-ad CRM stats (shared across all levels)
    const adCrm={};
    (window._saleFiltered||[]).forEach(r=>{
      const adId=(r[COL_SALE.AD_ID]||'').trim();if(!adId)return;
      if(!adCrm[adId])adCrm[adId]={orders:0,revenue:0};
      if(/^chốt\s*đơn/i.test(r[COL_SALE.STATUS]||'')){
        adCrm[adId].orders++;adCrm[adId].revenue+=toNum(r[COL_SALE.REVENUE]);
      }
    });
    window._adCrm=adCrm;

    if(COL.ADSET_NAME>=0){
      // ── Show all Nhóm QC + QC expanded at once ──
      let adRows=_rawAll.filter(r=>{
        if((r[COL.CAMPAIGN]||'').trim()!==campName)return false;
        const adId=String(r[COL.AD_ID]||'').trim();if(!/^\d{8,}$/.test(adId))return false;
        const dateCol=(r[COL.DATE]||'').trim();
        if(!dateCol||dateCol.toLowerCase()==='all')return false;
        const d=parseDate(dateCol);if(!d)return false;
        if(fromD&&d<fromD)return false;if(toD&&d>toD)return false;
        return true;
      });
      if(!adRows.length){
        adRows=_rawAll.filter(r=>{
          if((r[COL.CAMPAIGN]||'').trim()!==campName)return false;
          return /^\d{8,}$/.test(String(r[COL.AD_ID]||'').trim());
        });
      }
      if(!adRows.length){
        content.innerHTML='<div style="padding:12px 20px;font-size:12px;color:var(--muted);font-weight:600">Không có QC nào trong khoảng ngày này</div>';
      } else {
        // Group by AdSet → AdID
        const setOrder=[];
        const bySet={};
        adRows.forEach(r=>{
          const as=(r[COL.ADSET_NAME]||'').trim()||'—';
          const id=String(r[COL.AD_ID]||'').trim();
          const nm=COL.AD_NAME>=0?(r[COL.AD_NAME]||'').trim():'';
          if(!bySet[as]){bySet[as]={name:as,spend:0,mess:0,ads:{}};setOrder.push(as);}
          bySet[as].spend+=toNum(r[COL.SPEND]);bySet[as].mess+=toNum(r[COL.MESSAGES]);
          if(!bySet[as].ads[id])bySet[as].ads[id]={id,nm,spend:0,mess:0};
          bySet[as].ads[id].spend+=toNum(r[COL.SPEND]);bySet[as].ads[id].mess+=toNum(r[COL.MESSAGES]);
        });
        // Per-set CRM totals
        const ascrm={};
        setOrder.forEach(as=>{
          ascrm[as]={orders:0,revenue:0};
          Object.keys(bySet[as].ads).forEach(id=>{if(adCrm[id]){ascrm[as].orders+=adCrm[id].orders;ascrm[as].revenue+=adCrm[id].revenue;}});
        });
        const bb=getBrandBadge(campName);
        const th=h=>`<th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap">${h}</th>`;

        setOrder.sort((a,b)=>bySet[b].spend-bySet[a].spend).forEach(as=>{
          const s=bySet[as];const cs=ascrm[as];
          const cpm=s.mess>0?s.spend/s.mess:0;
          const adsDs=cs&&cs.revenue>0?pct(s.spend/cs.revenue*100):'—';
          const dsc=cs&&cs.revenue>0?'color:var(--green);font-weight:800':'color:var(--muted)';
          // Ad set header row
          html+=`<tr style="border-top:2px solid var(--border);background:var(--surface2)">

            <td style="padding:8px 13px;font-weight:700">${cpm>0?vnd(cpm):'—'}</td>
            <td style="padding:8px 13px;font-weight:700;${dsc}">${adsDs}</td>
            <td style="padding:8px 13px;font-weight:700;${dsc}">${cs?vnd(cs.revenue):'—'}</td>
            <td style="padding:8px 13px;font-weight:700;${dsc}">${cs?num(cs.orders):'—'}</td>
            <td style="padding:8px 13px;font-weight:700;${dsc}">${cs&&cs.orders>0?vnd(cs.revenue/cs.orders):'—'}</td>

          </tr>`;
          // Individual QC rows
          const ads=Object.values(s.ads).sort((a,b)=>b.spend-a.spend);
          const maxAd=Math.max(...ads.map(a=>a.spend),1);
          ads.forEach(a=>{

            const abp=(a.spend/maxAd*100).toFixed(1);
            const ac=adCrm[a.id];

            const adsc=ac&&ac.revenue>0?'color:var(--green);font-weight:700':'color:var(--muted)';
            html+=`<tr style="border-top:1px solid var(--border)">
              <td style="padding:7px 13px 7px 22px;font-family:monospace;font-size:10px;color:var(--muted)">${a.id}</td>
              <td style="padding:7px 13px;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.nm}">${a.nm||'—'}</td>
              <td style="padding:7px 13px">${bb}</td>
              <td style="padding:7px 13px;font-weight:700"><div class="bar-cell"><span>${vnd(a.spend)}</span><div class="bar-bg"><div class="bar-fill" style="width:${abp}%;background:var(--accent)"></div></div></div></td>

            </tr>`;
          });

        html+='</tbody></table>';
        content.innerHTML=html;
      }
    } else {
      // ── Fallback (no ADSET_NAME col): show QC directly ──
      let adRowsAll=_rawAll.filter(r=>{
        if((r[COL.CAMPAIGN]||'').trim()!==campName)return false;

// ── Level 3: QC (Ads) within an Ad Set ──
function toggleAdSet(ck){
  const row=document.getElementById('adset-'+ck);
  const arrow=document.getElementById('arrow-adset-'+ck);
  const content=document.getElementById('adset-content-'+ck);
  const isOpen=row.style.display!=='none';
  if(isOpen){row.style.display='none';arrow.textContent='▶';return;}
  row.style.display='';
  arrow.innerHTML='<span style="color:var(--accent)">▼</span>';
  const splitIdx=ck.indexOf('__');
  const campName=decodeURIComponent(ck.substring(0,splitIdx));
  const adSetName=decodeURIComponent(ck.substring(splitIdx+2));
  const fromVal=(document.getElementById('dateFrom')||{}).value||'';
  const toVal=(document.getElementById('dateTo')||{}).value||'';
  const fromD=fromVal?localDate(fromVal):null;
  const toD=toVal?localDate(toVal,true):null;
  const _rawAll=window.allRowsRaw||[];
  const adCrm=window._adCrm||{};

  let adRows=_rawAll.filter(r=>{
    if((r[COL.CAMPAIGN]||'').trim()!==campName)return false;
    if((r[COL.ADSET_NAME]||'').trim()!==adSetName)return false;
    const adId=String(r[COL.AD_ID]||'').trim();if(!/^\d{8,}$/.test(adId))return false;
    const dateCol=(r[COL.DATE]||'').trim();
    if(!dateCol||dateCol.toLowerCase()==='all')return false;
    const d=parseDate(dateCol);if(!d)return false;
    if(fromD&&d<fromD)return false;if(toD&&d>toD)return false;
    return true;
  });
  if(!adRows.length){
    adRows=_rawAll.filter(r=>{
      if((r[COL.CAMPAIGN]||'').trim()!==campName)return false;
      if((r[COL.ADSET_NAME]||'').trim()!==adSetName)return false;
      return /^\d{8,}$/.test(String(r[COL.AD_ID]||'').trim());
    });
  }
  if(!adRows.length){
    content.innerHTML='<div style="padding:10px 24px;font-size:12px;color:var(--muted)">Không có QC nào trong nhóm này</div>';return;
  }
  const byAd={};
  adRows.forEach(r=>{
    const id=String(r[COL.AD_ID]||'').trim();
    const name=COL.AD_NAME>=0?(r[COL.AD_NAME]||'').trim():'';
    if(!byAd[id])byAd[id]={id,name,spend:0,mess:0};
    byAd[id].spend+=toNum(r[COL.SPEND]);byAd[id].mess+=toNum(r[COL.MESSAGES]);
  });
  const ads=Object.values(byAd).sort((a,b)=>b.spend-a.spend);
  const maxSp=Math.max(...ads.map(a=>a.spend),1);
  const bb=getBrandBadge(campName);
  let html='<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:var(--surface2)">';
  ['Mã QC','Tên QC','Brand','Chi phí','Mess','CP/Mess','ADS/DS','Doanh số','Đơn chốt','DS TB/Đơn','Tỷ lệ chốt'].forEach(h=>{
    html+=`<th style="padding:6px 13px 6px ${h==='Mã QC'?'28px':'13px'};text-align:left;font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap">${h}</th>`;
  });
  html+='</tr></thead><tbody>';
  ads.forEach(a=>{
    const cpm=a.mess>0?a.spend/a.mess:0;
    const bp=(a.spend/maxSp*100).toFixed(1);
    const cs=adCrm[a.id];
    const adsDs=cs&&cs.revenue>0?pct(a.spend/cs.revenue*100):'—';
    const dsc=cs&&cs.revenue>0?'color:var(--green);font-weight:800':'color:var(--muted)';
    html+=`<tr style="border-top:1px solid var(--border)">
      <td style="padding:7px 13px 7px 28px;font-family:monospace;font-size:10px;color:var(--muted)">${a.id}</td>
      <td style="padding:7px 13px;font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.name}">${a.name||'—'}</td>
      <td style="padding:7px 13px">${bb}</td>
      <td style="padding:7px 13px;font-weight:700"><div class="bar-cell"><span>${vnd(a.spend)}</span><div class="bar-bg"><div class="bar-fill" style="width:${bp}%;background:var(--accent)"></div></div></div></td>
      <td style="padding:7px 13px;font-weight:700">${num(a.mess)}</td>
      <td style="padding:7px 13px;font-weight:700">${cpm>0?vnd(cpm):'—'}</td>
      <td style="padding:7px 13px;font-weight:700;${dsc}">${adsDs}</td>
      <td style="padding:7px 13px;font-weight:700;${dsc}">${cs?vnd(cs.revenue):'—'}</td>
      <td style="padding:7px 13px;font-weight:700;${dsc}">${cs?num(cs.orders):'—'}</td>
      <td style="padding:7px 13px;font-weight:700;${dsc}">${cs&&cs.orders>0?vnd(cs.revenue/cs.orders):'—'}</td>
      <td style="padding:7px 13px;font-weight:700;${dsc}">${cs&&a.mess>0?pct(cs.orders/a.mess*100):'—'}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  content.innerHTML=html;
}

// ── Charts ──
function buildBrandChart(htSpend,sdSpend,ctSpend,total){
  const ctx=document.getElementById('cBrand');if(!ctx)return;
  const labels=[],data=[],bgC=[],bdC=[];
  if(htSpend>0){labels.push('Hiền Thuỷ');data.push(htSpend);bgC.push('rgba(249,115,22,.85)');bdC.push('#f97316');}
  if(sdSpend>0){labels.push('Shidai');data.push(sdSpend);bgC.push('rgba(8,145,178,.85)');bdC.push('#0891b2');}
  if(ctSpend>0){labels.push('Chánh Tâm');data.push(ctSpend);bgC.push('rgba(124,58,237,.85)');bdC.push('#7c3aed');}
  chartBrand=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:bgC,borderColor:bdC,borderWidth:2,hoverOffset:8}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{
        legend:{position:'right',labels:{color:'var(--text)',font:{size:11,family:'Inter',weight:'600'},padding:14,
          generateLabels:chart=>{

function calcKPI(rows){
  let ts=0,tm=0,treach=0,timp=0,ctrS=0,cpcS=0,n=0;
  rows.forEach(r=>{
    ts+=toNum(r[COL.SPEND]);tm+=toNum(r[COL.MESSAGES]);
    treach+=toNum(r[COL.REACH]);timp+=toNum(r[COL.IMPRESSIONS]);
    ctrS+=toNum(r[COL.CTR]);cpcS+=toNum(r[COL.CPC]);n++;
  });
  return{totalSpend:ts,totalMess:tm,totalResults:0,totalReach:treach,totalImpressions:timp,
    costPerMess:tm>0?ts/tm:0,avgCTR:n>0?ctrS/n:0,avgCPC:n>0?cpcS/n:0,roas:0};
}

  let spend=0,mess=0,comments=0,ctrS=0,cpcS=0,n=0;

function groupByCamp(rows){
  const g={};
  rows.forEach(r=>{
    const name=(r[COL.CAMPAIGN]||'').trim();
    if(!g[name])g[name]={name,status:'',spend:0,mess:0,results:0,reach:0,impressions:0,comments:0,ctr:0,cpc:0,n:0};
    g[name].spend+=toNum(r[COL.SPEND]);g[name].mess+=toNum(r[COL.MESSAGES]);
    g[name].reach+=toNum(r[COL.REACH]);g[name].impressions+=toNum(r[COL.IMPRESSIONS]);
    g[name].comments+=toNum(r[COL.COMMENTS]);
    g[name].ctr+=toNum(r[COL.CTR]);g[name].cpc+=toNum(r[COL.CPC]);g[name].n++;
  });
  return g;
}

function parseDate(v){
  if(!v)return null;const s=String(v).trim();
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return new Date(+iso[1],+iso[2]-1,+iso[3]);
  const vn=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(vn)return new Date(+vn[3],+vn[2]-1,+vn[1]);
  return null;
}
function fmtDate(d){if(!d)return'';return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();}
function toNum(v){
  if(v===null||v===undefined||v==='')return 0;
  let s=String(v).trim();
  const dots=(s.match(/\./g)||[]).length;
  const commas=(s.match(/,/g)||[]).length;
  if(dots>0&&commas>0){
    // 1.234,56 hoặc 1,234.56 → bỏ thousands sep, giữ decimal
    if(s.indexOf(',')>s.indexOf('.'))s=s.replace(/\./g,'').replace(',','.');
    else s=s.replace(/,/g,'');
  } else if(commas>1){
    // 3,900,000 → bỏ tất cả dấu phẩy (thousands sep)
    s=s.replace(/,/g,'');
  } else if(commas===1){
    s=s.replace(',','.');
  } else if(dots>1){
    // 3.900.000 (Vietnamese) → bỏ tất cả dấu chấm
    s=s.replace(/\./g,'');
  }
  const n=parseFloat(s.replace(/[^0-9.-]/g,''));
  return isNaN(n)?0:n;
}
function vnd(n){return new Intl.NumberFormat('vi-VN').format(Math.round(n))+' ₫';}
function num(n){return new Intl.NumberFormat('vi-VN').format(Math.round(n));}
function pct(n){return n>0?n.toFixed(2)+'%':'—';}

function toggleUrlPanel(){
  const panel=document.getElementById('urlPanel');
  const btn=document.getElementById('settingsBtn');
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  btn.classList.toggle('active',!isOpen);
  if(!isOpen){
    setTimeout(()=>{
      document.addEventListener('click',function handler(e){
        if(!panel.contains(e.target)&&e.target!==btn){
          panel.classList.remove('open');
          btn.classList.remove('active');
          document.removeEventListener('click',handler);
        }
      });
    },100);
  }
}
